name: Release

# Triggers when a tag matching vMAJOR.MINOR.PATCH is pushed.
# Builds the Tauri app for Linux, macOS, and Windows, creates a GitHub
# release, and uploads the installers as downloadable assets.
#
# Prerequisites:
#   - No secrets required for unsigned builds.
#   - For macOS code signing add: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD,
#     APPLE_SIGNING_IDENTITY, APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID
#   - For Windows code signing add: WINDOWS_CERTIFICATE, WINDOWS_CERTIFICATE_PASSWORD
#
# Note: bundle.active is false in tauri.conf.json (local dev convenience).
# The --bundles flag below overrides that for CI builds.
# AppImage is excluded — linuxdeploy downloads tools at runtime and hangs in CI.

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            bundles: deb,rpm
          - platform: macos-latest
            bundles: dmg
          - platform: windows-latest
            bundles: nsis,msi

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: macscraper ${{ github.ref_name }}
          releaseBody: |
            See the assets below to download and install macscraper ${{ github.ref_name }}.
          releaseDraft: false
          prerelease: false
          args: --bundles ${{ matrix.bundles }}
